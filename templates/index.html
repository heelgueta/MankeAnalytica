<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MañkeAnalytica</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:      #0d0f17;
    --surface: #14162050;
    --surface2:#1a1d2e;
    --border:  #252840;
    --accent:  #9b7dd4;
    --accent2: #7a5eb8;
    --text:    #d2d0e0;
    --muted:   #5e5c7a;
    --ok:      #6db88c;
    --warn:    #d4b86a;
    --err:     #d05060;
    --radius:  8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px; min-height: 100vh;
  }
  header {
    padding: 18px 32px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: .5px; }
  header p  { color: var(--muted); font-size: 12px; }

  .layout {
    display: grid; grid-template-columns: 300px 1fr;
    height: calc(100vh - 57px);
  }
  .panel { border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .ps    { padding: 16px 16px; border-bottom: 1px solid var(--border); }
  .ps:last-child { border-bottom: none; flex: 1; }
  .main  { overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }

  .sec-label { font-size: 10px; text-transform: uppercase; letter-spacing: .9px; color: var(--muted); margin-bottom: 10px; }

  .file-list { display: flex; flex-direction: column; gap: 5px; }
  .file-card {
    padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius);
    cursor: pointer; transition: border-color .15s, background .15s;
  }
  .file-card:hover  { border-color: var(--accent); background: rgba(155,125,212,.05); }
  .file-card.active { border-color: var(--accent); background: rgba(155,125,212,.1); }
  .file-card .fname { font-size: 11px; font-weight: 600; word-break: break-all; }
  .file-card .fmeta { font-size: 10px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .ftag {
    display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
    margin: 2px 2px 0 0; border: 1px solid;
  }
  .ftag.narki  { background: rgba(212,168,106,.1);  color: #d4a86a; border-color: rgba(212,168,106,.3); }
  .ftag.filu   { background: rgba(139,196,76,.1);   color: #8bc44c; border-color: rgba(139,196,76,.3); }
  .ftag.culpem { background: rgba(232,115,58,.1);   color: #e8733a; border-color: rgba(232,115,58,.3); }
  .ftag.info   { background: rgba(155,125,212,.1);  color: var(--accent); border-color: rgba(155,125,212,.25); }
  .empty { color: var(--muted); font-size: 12px; font-style: italic; padding: 6px 0; }

  .btn-analyse {
    width: 100%; padding: 10px; background: var(--accent); color: #0d0f17;
    border: none; border-radius: var(--radius); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: background .15s; margin-top: 10px;
  }
  .btn-analyse:hover    { background: var(--accent2); color: #fff; }
  .btn-analyse:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* stat pills */
  .stat-pills { display: flex; flex-wrap: wrap; gap: 10px; }
  .pill {
    flex: 1; min-width: 110px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; text-align: center;
  }
  .pill .pval { font-size: 22px; font-weight: 700; color: var(--accent); }
  .pill .plbl { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .7px; }

  /* chart cards */
  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: .9px;
    color: var(--muted); padding-bottom: 10px; border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .chart-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .chart-card.wide { grid-column: 1 / -1; }
  .chart-title { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 12px; }
  .chart-wrap  { position: relative; height: 220px; }
  .chart-wrap.tall  { height: 300px; }
  .chart-wrap.short { height: 160px; }

  /* temporal granularity */
  .gran-tabs { display: flex; gap: 0; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; width: fit-content; }
  .gran-tab {
    padding: 4px 12px; font-size: 11px; font-weight: 600; color: var(--muted);
    background: transparent; border: none; cursor: pointer; transition: background .15s, color .15s;
  }
  .gran-tab.active { background: var(--accent); color: #0d0f17; }

  /* sentiment score color scale */
  .score-label { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }

  #placeholder {
    text-align: center; padding: 60px 20px; color: var(--muted);
    font-size: 13px; line-height: 2;
  }
  #placeholder .big { font-size: 42px; display: block; margin-bottom: 10px; }

  /* question breakdown table */
  .q-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .q-table th { text-align: left; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .7px; padding: 4px 8px; border-bottom: 1px solid var(--border); }
  .q-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .q-table tr:last-child td { border-bottom: none; }
  .bar-mini { height: 10px; border-radius: 3px; display: inline-block; min-width: 2px; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>🦅 MañkeAnalytica</h1>
  <p><em>mañke</em> (cóndor, mapudungun) + <em>analytica</em> (latín) &mdash; análisis estadístico del corpus</p>
</header>

<div class="layout">

  <!-- LEFT -->
  <div class="panel">
    <div class="ps">
      <div class="sec-label">Corpus disponible</div>
      <div class="file-list" id="file-list">
        <div class="empty">Buscando archivos…</div>
      </div>
      <button class="btn-analyse" id="analyse-btn" onclick="runAnalysis()" disabled>
        Selecciona un archivo
      </button>
    </div>
    <div class="ps" style="flex:1">
      <div class="sec-label">Fuentes detectadas</div>
      <div id="source-label" style="font-size:11px;color:var(--muted);font-style:italic;line-height:1.8">—</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="main" id="main-content">
    <div id="placeholder">
      <span class="big">🦅</span>
      Selecciona un CSV para ver los análisis
    </div>
  </div>

</div>

<script>
let selectedFile = null;
let statsData    = null;
let charts       = {};
let granularity  = 'month';

const ACCENT  = '#9b7dd4';
const ACCENT2 = '#7a5eb8';
const OK      = '#6db88c';
const WARN    = '#d4b86a';
const ERR     = '#d05060';
const MUTED   = '#5e5c7a';
const BORDER  = '#252840';
const TEXT    = '#d2d0e0';

// sentiment colour map
const SENT_COLORS = {
  muy_negativo: '#d05060',
  negativo:     '#d4946a',
  neutro:       '#8888aa',
  positivo:     '#6db88c',
  muy_positivo: '#4ccc6a',
};

const PALETTE = [
  '#9b7dd4','#6db88c','#d4b86a','#d05060','#5ba8d4',
  '#d47d9b','#7dd4b8','#d49b7d','#7d9bd4','#b8d46d',
  '#d4c44c','#4cd4c4','#c44cd4','#8bc44c','#c48b4c',
];

Chart.defaults.color       = TEXT;
Chart.defaults.borderColor = BORDER;
Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";
Chart.defaults.font.size   = 11;

// ── file loading ──────────────────────────────────────────────────────────────

async function loadFiles() {
  try {
    const r = await fetch('/files');
    const d = await r.json();
    const list = document.getElementById('file-list');

    // collect source types present
    const sources = [...new Set(d.files.map(f => f.source))];
    document.getElementById('source-label').innerHTML = sources.length
      ? sources.map(s => `<span class="ftag ${s}">${s}</span>`).join(' ')
      : '—';

    if (!d.files.length) {
      list.innerHTML = '<div class="empty">Sin archivos. Ejecuta CulpemCorpus, ÑarkiMundatio o FiluSententia primero.</div>';
      return;
    }
    list.innerHTML = '';
    d.files.forEach(f => {
      const m    = f.meta;
      const tags = [f.source];
      if (m.analysis)    tags.push(m.analysis);
      if (m.query || m.source_file) tags.push(m.query || m.source_file);
      if (m.n_articles || m.n_output || m.n_rows)
        tags.push((m.n_articles || m.n_output || m.n_rows) + ' filas');
      if (m.created_at)  tags.push(m.created_at.slice(0,10));

      const card = document.createElement('div');
      card.className = 'file-card';
      card.innerHTML = `
        <div class="fname">${f.name}</div>
        <div class="fmeta">${(f.size/1024).toFixed(1)} KB
          ${tags.map(t => `<span class="ftag ${f.source}">${t}</span>`).join('')}
        </div>`;
      card.onclick = () => selectFile(f.name, card);
      list.appendChild(card);
    });
  } catch(e) { console.error(e); }
}

function selectFile(name, cardEl) {
  selectedFile = name;
  document.querySelectorAll('.file-card').forEach(c => c.classList.remove('active'));
  cardEl.classList.add('active');
  const btn = document.getElementById('analyse-btn');
  btn.disabled = false;
  btn.textContent = 'Analizar →';
}

// ── analysis ──────────────────────────────────────────────────────────────────

async function runAnalysis() {
  if (!selectedFile) return;
  document.getElementById('analyse-btn').disabled = true;
  document.getElementById('analyse-btn').textContent = 'Analizando…';
  try {
    const r = await fetch('/analyse?file=' + encodeURIComponent(selectedFile));
    statsData = await r.json();
    if (statsData.error) { alert(statsData.error); return; }
    renderDashboard();
  } catch(e) { alert('Error: ' + e); }
  finally {
    document.getElementById('analyse-btn').disabled = false;
    document.getElementById('analyse-btn').textContent = 'Analizar →';
  }
}

// ── render ────────────────────────────────────────────────────────────────────

function renderDashboard() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const d   = statsData;
  const mc  = document.getElementById('main-content');
  const filu = d.filu || {};

  const hasSent  = filu.sentiment && Object.keys(filu.sentiment).length;
  const hasCont  = filu.content;
  const hasQ     = filu.questions;

  let html = `
    <!-- pills -->
    <div class="stat-pills">
      <div class="pill"><div class="pval">${d.n.toLocaleString()}</div><div class="plbl">Filas</div></div>
      <div class="pill"><div class="pval">${d.sources.length}</div><div class="plbl">Fuentes</div></div>
      <div class="pill"><div class="pval">${d.lengths.avg}</div><div class="plbl">Palabras prom.</div></div>
      <div class="pill"><div class="pval">${d.lengths.max.toLocaleString()}</div><div class="plbl">Máx. palabras</div></div>
      <div class="pill"><div class="pval">${d.temporal.by_year.length}</div><div class="plbl">Años</div></div>
    </div>

    <!-- base charts section -->
    <div class="section-title">Corpus base</div>

    <!-- temporal -->
    <div class="chart-card wide">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="chart-title">Volumen temporal</div>
        <div class="gran-tabs">
          <button class="gran-tab ${granularity==='year'?'active':''}" onclick="setGran('year')">Año</button>
          <button class="gran-tab ${granularity==='month'?'active':''}" onclick="setGran('month')">Mes</button>
          <button class="gran-tab ${granularity==='date'?'active':''}" onclick="setGran('date')">Día</button>
        </div>
      </div>
      <div class="chart-wrap tall"><canvas id="ch-temporal"></canvas></div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">Artículos por fuente</div>
        <div class="chart-wrap"><canvas id="ch-sources"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Distribución de largo (palabras)</div>
        <div class="chart-wrap"><canvas id="ch-lengths"></canvas></div>
      </div>
      <div class="chart-card wide">
        <div class="chart-title">Palabras más frecuentes (top 30)</div>
        <div class="chart-wrap tall"><canvas id="ch-words"></canvas></div>
      </div>
    </div>`;

  // ── filu sentiment section ────────────────────────────────────────────────
  if (hasSent) {
    const prefixes = Object.keys(filu.sentiment);
    html += `<div class="section-title">🐍 FiluSententia — Sentimiento</div><div class="chart-grid">`;
    prefixes.forEach(p => {
      const lbl = p === 'body' ? 'Cuerpo' : 'Título';
      html += `
        <div class="chart-card">
          <div class="chart-title">Distribución — ${lbl}</div>
          <div class="chart-wrap"><canvas id="ch-sent-dist-${p}"></canvas></div>
        </div>`;
    });
    // score over time (body preferred, fallback title)
    const scorePrefix = prefixes.includes('body') ? 'body' : prefixes[0];
    html += `
      <div class="chart-card wide">
        <div class="chart-title">Score promedio por mes (${scorePrefix === 'body' ? 'cuerpo' : 'título'}, escala 1–5)</div>
        <div class="chart-wrap"><canvas id="ch-sent-time"></canvas></div>
      </div>
      <div class="chart-card wide">
        <div class="chart-title">Score promedio por fuente (${scorePrefix === 'body' ? 'cuerpo' : 'título'})</div>
        <div class="chart-wrap"><canvas id="ch-sent-src"></canvas></div>
      </div>
    </div>`;
  }

  // ── filu content section ──────────────────────────────────────────────────
  if (hasCont) {
    html += `
    <div class="section-title">🐍 FiluSententia — Contenido</div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">Temas principales</div>
        <div class="chart-wrap"><canvas id="ch-topics"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Entidades más mencionadas</div>
        <div class="chart-wrap"><canvas id="ch-entities"></canvas></div>
      </div>
    </div>`;
  }

  // ── filu questions section ────────────────────────────────────────────────
  if (hasQ) {
    html += `
    <div class="section-title">🐍 FiluSententia — Preguntas sí/no</div>
    <div class="chart-card wide">
      <div class="chart-title">Respuestas por pregunta</div>
      <div class="chart-wrap tall"><canvas id="ch-questions"></canvas></div>
    </div>
    <div class="chart-card wide" style="padding:0">
      <table class="q-table">
        <thead><tr>
          <th>Pregunta</th><th>Sí</th><th>No</th><th>Visualización</th>
        </tr></thead>
        <tbody id="q-table-body"></tbody>
      </table>
    </div>`;
  }

  mc.innerHTML = html;

  // draw base charts
  drawTemporal();
  drawSources();
  drawLengths();
  drawWords();

  // draw filu charts
  if (hasSent) drawSentiment();
  if (hasCont) drawContent();
  if (hasQ)    drawQuestions();
}

// ── base charts ───────────────────────────────────────────────────────────────

function setGran(g) {
  granularity = g;
  document.querySelectorAll('.gran-tab').forEach(b => {
    const map = {'year':'Año','month':'Mes','date':'Día'};
    b.classList.toggle('active', b.textContent === map[g]);
  });
  charts['temporal']?.destroy(); delete charts['temporal'];
  drawTemporal();
}

function drawTemporal() {
  const series = granularity === 'year' ? statsData.temporal.by_year :
                 granularity === 'month' ? statsData.temporal.by_month :
                 statsData.temporal.by_date;
  if (!series.length) return;
  charts['temporal'] = new Chart(
    document.getElementById('ch-temporal').getContext('2d'), {
    type: 'bar',
    data: { labels: series.map(x=>x[0]), datasets: [{
      data: series.map(x=>x[1]),
      backgroundColor: ACCENT+'99', borderColor: ACCENT,
      borderWidth: 1, borderRadius: 3,
    }]},
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { grid:{color:BORDER}, ticks:{maxRotation:45} }, y: { grid:{color:BORDER}, beginAtZero:true } }
    }
  });
}

function drawSources() {
  const src = statsData.sources.slice(0,12);
  charts['sources'] = new Chart(
    document.getElementById('ch-sources').getContext('2d'), {
    type: 'bar',
    data: { labels: src.map(x=>x[0]), datasets: [{
      data: src.map(x=>x[1]),
      backgroundColor: src.map((_,i)=>PALETTE[i%PALETTE.length]+'bb'),
      borderColor:     src.map((_,i)=>PALETTE[i%PALETTE.length]),
      borderWidth: 1, borderRadius: 3,
    }]},
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{grid:{color:BORDER},beginAtZero:true},y:{grid:{color:BORDER}}}
    }
  });
}

function drawLengths() {
  const bkts = statsData.lengths.buckets;
  charts['lengths'] = new Chart(
    document.getElementById('ch-lengths').getContext('2d'), {
    type: 'bar',
    data: { labels: bkts.map(x=>x[0]), datasets: [{
      data: bkts.map(x=>x[1]),
      backgroundColor: PALETTE.slice(0,bkts.length).map(c=>c+'bb'),
      borderColor:     PALETTE.slice(0,bkts.length),
      borderWidth: 1, borderRadius: 3,
    }]},
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{grid:{color:BORDER},beginAtZero:true},y:{grid:{color:BORDER}}}
    }
  });
}

function drawWords() {
  const words = statsData.top_words.slice(0,30);
  charts['words'] = new Chart(
    document.getElementById('ch-words').getContext('2d'), {
    type: 'bar',
    data: { labels: words.map(x=>x[0]), datasets: [{
      data: words.map(x=>x[1]),
      backgroundColor: words.map((_,i)=>PALETTE[i%PALETTE.length]+'aa'),
      borderColor:     words.map((_,i)=>PALETTE[i%PALETTE.length]),
      borderWidth: 1, borderRadius: 3,
    }]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{grid:{color:BORDER},ticks:{maxRotation:45}},y:{grid:{color:BORDER},beginAtZero:true}}
    }
  });
}

// ── filu sentiment charts ─────────────────────────────────────────────────────

function drawSentiment() {
  const sent = statsData.filu.sentiment;
  const prefixes = Object.keys(sent);

  prefixes.forEach(p => {
    const dist   = sent[p].label_dist;   // [[label, count], ...]
    const labels = dist.map(x => x[0]);
    const data   = dist.map(x => x[1]);
    const colors = labels.map(l => SENT_COLORS[l] || MUTED);
    charts[`sent-dist-${p}`] = new Chart(
      document.getElementById(`ch-sent-dist-${p}`).getContext('2d'), {
      type: 'bar',
      data: { labels, datasets: [{ data, backgroundColor: colors.map(c=>c+'bb'), borderColor: colors, borderWidth:1, borderRadius:3 }]},
      options: { indexAxis:'y', responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false } },
        scales:{x:{grid:{color:BORDER},beginAtZero:true},y:{grid:{color:BORDER}}}
      }
    });
  });

  // score over time
  const sp   = prefixes.includes('body') ? 'body' : prefixes[0];
  const time = sent[sp].avg_by_month;
  if (time.length) {
    charts['sent-time'] = new Chart(
      document.getElementById('ch-sent-time').getContext('2d'), {
      type: 'line',
      data: { labels: time.map(x=>x[0]), datasets: [{
        data: time.map(x=>x[1]),
        borderColor: ACCENT, backgroundColor: ACCENT+'33',
        borderWidth: 2, fill: true, tension: 0.3, pointRadius: 3,
      }]},
      options: { responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false} },
        scales:{
          x:{grid:{color:BORDER},ticks:{maxRotation:45}},
          y:{grid:{color:BORDER}, min:1, max:5,
             ticks:{ callback: v => ({1:'muy neg.',2:'neg.',3:'neutro',4:'pos.',5:'muy pos.'})[v]||v }}
        }
      }
    });
  }

  // score by source
  const srcData = sent[sp].avg_by_source;
  if (srcData.length) {
    charts['sent-src'] = new Chart(
      document.getElementById('ch-sent-src').getContext('2d'), {
      type: 'bar',
      data: { labels: srcData.map(x=>x[0]), datasets: [{
        data: srcData.map(x=>x[1]),
        backgroundColor: srcData.map(x => scoreColor(x[1]) + 'bb'),
        borderColor:     srcData.map(x => scoreColor(x[1])),
        borderWidth: 1, borderRadius: 3,
      }]},
      options: { responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false} },
        scales:{
          x:{grid:{color:BORDER}},
          y:{grid:{color:BORDER}, min:1, max:5, beginAtZero:false,
             ticks:{ callback: v => v }}
        }
      }
    });
  }
}

function scoreColor(v) {
  if (v <= 1.5) return SENT_COLORS.muy_negativo;
  if (v <= 2.5) return SENT_COLORS.negativo;
  if (v <= 3.5) return SENT_COLORS.neutro;
  if (v <= 4.5) return SENT_COLORS.positivo;
  return SENT_COLORS.muy_positivo;
}

// ── filu content charts ───────────────────────────────────────────────────────

function drawContent() {
  const cont = statsData.filu.content;

  // topics
  const topics = cont.topics.slice(0,15);
  if (topics.length) {
    charts['topics'] = new Chart(
      document.getElementById('ch-topics').getContext('2d'), {
      type: 'bar',
      data: { labels: topics.map(x=>x[0]), datasets: [{
        data: topics.map(x=>x[1]),
        backgroundColor: PALETTE.slice(0,topics.length).map(c=>c+'bb'),
        borderColor:     PALETTE.slice(0,topics.length),
        borderWidth: 1, borderRadius: 3,
      }]},
      options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{color:BORDER},beginAtZero:true},y:{grid:{color:BORDER}}}
      }
    });
  }

  // entities
  const ents = cont.entities.slice(0,15);
  if (ents.length) {
    charts['entities'] = new Chart(
      document.getElementById('ch-entities').getContext('2d'), {
      type: 'bar',
      data: { labels: ents.map(x=>x[0]), datasets: [{
        data: ents.map(x=>x[1]),
        backgroundColor: PALETTE.slice(0,ents.length).map((_,i)=>PALETTE[(i+5)%PALETTE.length]+'bb'),
        borderColor:     PALETTE.slice(0,ents.length).map((_,i)=>PALETTE[(i+5)%PALETTE.length]),
        borderWidth:1, borderRadius:3,
      }]},
      options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{color:BORDER},beginAtZero:true},y:{grid:{color:BORDER}}}
      }
    });
  }
}

// ── filu questions charts ─────────────────────────────────────────────────────

function drawQuestions() {
  const qs     = statsData.filu.questions;
  const ids    = qs.ids;
  const stats  = qs.stats;
  const texts  = qs.texts || {};

  const yesData = ids.map(id => stats[id]?.answers?.['sí'] || 0);
  const noData  = ids.map(id => stats[id]?.answers?.['no'] || 0);
  const labels  = ids.map(id => texts[id] ? texts[id].slice(0,50) : id);

  charts['questions'] = new Chart(
    document.getElementById('ch-questions').getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Sí',  data: yesData, backgroundColor: OK+'bb',  borderColor: OK,  borderWidth:1, borderRadius:3 },
        { label:'No',  data: noData,  backgroundColor: ERR+'bb', borderColor: ERR, borderWidth:1, borderRadius:3 },
      ]
    },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ boxWidth:12, font:{size:11} } } },
      scales:{
        x:{grid:{color:BORDER}, ticks:{maxRotation:30}},
        y:{grid:{color:BORDER}, beginAtZero:true, stacked:false}
      }
    }
  });

  // mini table
  const tbody = document.getElementById('q-table-body');
  const total = statsData.n;
  ids.forEach(id => {
    const yes  = stats[id]?.answers?.['sí'] || 0;
    const no   = stats[id]?.answers?.['no'] || 0;
    const sum  = yes + no || 1;
    const yesPct = Math.round(yes/sum*100);
    const noPct  = Math.round(no/sum*100);
    const text   = texts[id] || id;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="max-width:260px;color:var(--text)">${text}</td>
      <td style="color:${OK};font-weight:600">${yes} <span style="color:var(--muted);font-size:10px">(${yesPct}%)</span></td>
      <td style="color:${ERR};font-weight:600">${no} <span style="color:var(--muted);font-size:10px">(${noPct}%)</span></td>
      <td style="min-width:120px">
        <span class="bar-mini" style="width:${yesPct}px;background:${OK}bb"></span>
        <span class="bar-mini" style="width:${noPct}px;background:${ERR}bb"></span>
      </td>`;
    tbody.appendChild(tr);
  });
}

loadFiles();
</script>
